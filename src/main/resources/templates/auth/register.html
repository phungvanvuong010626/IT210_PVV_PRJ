<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên - TP Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            border: none;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
        }
        .btn-register {
            background: linear-gradient(135deg, #198754, #146c43);
            border: none;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.4);
        }
        .logo-box {
            width: 60px;
            height: 60px;
            background: #198754;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -30px auto 15px;
            font-size: 1.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="register-overlay">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card register-card p-4 shadow-lg mt-4">
                    <div class="logo-box">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>

                    <h3 class="text-center fw-bold text-dark">TẠO TÀI KHOẢN</h3>
<!--                    <p class="text-center text-muted small mb-4">Trở thành thành viên để nhận nhiều ưu đãi</p>-->

                    <form th:action="@{/register}" th:object="${user}" method="post" novalidate>

                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold small">Họ và tên</label>
                                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A">
                                <small th:if="${errName}" class="text-danger small" th:text="${errName}"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Tên đăng nhập</label>
                                <input type="text" th:field="*{username}" class="form-control" placeholder="username123">
                                <small th:if="${errUser}" class="text-danger small" th:text="${errUser}"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Số điện thoại</label>
                                <input type="text" name="phoneNumber" class="form-control" placeholder="0987654321" th:value="${phoneNumber}">
                                <small th:if="${errPhone}" class="text-danger small" th:text="${errPhone}"></small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="name@gmail.com">
                            <small th:if="${errEmail}" class="text-danger small" th:text="${errEmail}"></small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="********">
                            <small th:if="${errPass}" class="text-danger small" th:text="${errPass}"></small>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-bold btn-register">
                            ĐĂNG KÝ NGAY <i class="bi bi-check-circle-fill ms-1"></i>
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <span class="text-muted small">Đã là thành viên?</span>
                        <a href="/login" class="text-decoration-none fw-bold text-success small">Đăng nhập tại đây</a>
                    </div>
                </div>

<!--                <div class="text-center mt-4">-->
<!--                    <a href="/user/home" class="text-white-50 text-decoration-none small">-->
<!--                        <i class="bi bi-house-door"></i> Quay lại trang chủ-->
<!--                    </a>-->
<!--                </div>-->
            </div>
        </div>
    </div>
</div>
</body>
</html>
