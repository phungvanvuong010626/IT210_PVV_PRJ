<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - TP Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .profile-card { border: none; border-radius: 20px; overflow: hidden; }
        .profile-header {
            background: linear-gradient(135deg, #0d6efd, #0043a8);
            height: 120px;
        }
        .avatar-wrapper { margin-top: -60px; }
        .avatar-img {
            width: 120px; height: 120px;
            border: 5px solid #fff;
            background: #fff;
        }
        .info-label { color: #6c757d; font-size: 0.85rem; text-uppercase: uppercase; font-weight: bold; }
        .info-value { color: #212529; font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card profile-card shadow-lg">
                <div class="profile-header"></div>

                <div class="card-body pt-0 px-5 pb-5">
                    <div class="avatar-wrapper text-center mb-4">
                        <img th:src="'https://ui-avatars.com/api/?name=' + ${user.fullName} + '&background=random&size=128'"
                             class="rounded-circle avatar-img shadow-sm" alt="Avatar">
                        <h3 class="fw-bold mt-3 mb-0" th:text="${user.fullName}">Họ tên người dùng</h3>
                        <span class="badge rounded-pill bg-primary-subtle text-primary px-3 py-2 mt-2"
                              th:text="${user.role}">CUSTOMER</span>
                    </div>

                    <div class="row g-4">
                        <div class="col-6">
                            <div class="info-label">Tên đăng nhập</div>
                            <div class="info-value"><i class="bi bi-person-circle me-1 text-muted"></i> <span th:text="${user.username}"></span></div>
                        </div>
                        <div class="col-6">
                            <div class="info-label">Số điện thoại</div>
                            <div class="info-value"><i class="bi bi-telephone me-1 text-muted"></i> <span th:text="${user.userProfile != null ? user.userProfile.phoneNumber : 'Chưa cập nhật'}"></span></div>
                        </div>
                        <div class="col-12">
                            <div class="info-label">Địa chỉ Email</div>
                            <div class="info-value"><i class="bi bi-envelope me-1 text-muted"></i> <span th:text="${user.email}"></span></div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="d-grid gap-2">
                        <div th:switch="${user.role.name()}">
                            <a th:case="'ADMIN'" href="/admin/movies" class="btn btn-dark w-100 py-2 fw-bold">
                                <i class="bi bi-speedometer2 me-2"></i>QUẢN LÝ HỆ THỐNG
                            </a>
                            <a th:case="'STAFF'" href="/staff/counter" class="btn btn-warning w-100 py-2 fw-bold">
                                <i class="bi bi-shop me-2"></i>NGHIỆP VỤ TẠI QUẦY
                            </a>
                            <a th:case="'CUSTOMER'" href="/user/home" class="btn btn-primary w-100 py-2 fw-bold">
                                <i class="bi bi-play-circle me-2"></i>TIẾP TỤC XEM PHIM
                            </a>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-outline-secondary w-100 fw-bold"><i class="bi bi-pencil-square"></i> SỬA HỒ SƠ</button>
                            <a href="/logout" class="btn btn-outline-danger w-100 fw-bold"><i class="bi bi-box-arrow-right"></i> ĐĂNG XUẤT</a>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center mt-4 text-muted small">
                © 2026 TP Cinema - Thành viên từ <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
