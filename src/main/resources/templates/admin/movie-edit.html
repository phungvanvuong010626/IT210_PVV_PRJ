<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Cập nhật phim - Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 15px; }
    .preview-poster { width: 100%; height: 420px; object-fit: cover; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .sticky-top { top: 20px; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark shadow-sm mb-4 py-2">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold text-primary" href="/admin/dashboard"><i class="bi bi-film me-2"></i> TP CINEMA ADMIN</a>
    <div class="d-flex gap-2">
      <a href="/admin/dashboard" class="btn btn-sm btn-outline-light">Tong quan</a>
      <a href="/admin/movies" class="btn btn-sm btn-primary">Quan ly phim</a>
      <a href="/admin/movies/showtimes/add" class="btn btn-sm btn-outline-light">Suat chieu</a>
      <a href="/logout" class="btn btn-sm btn-outline-danger">Dang xuat</a>
    </div>
  </div>
</nav>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-11">
      <div class="card shadow-lg p-4 p-md-5">
        <div class="d-flex align-items-center mb-4">
          <a href="/admin/movies" class="btn btn-outline-secondary btn-sm rounded-circle me-3">
            <i class="bi bi-arrow-left"></i>
          </a>
          <h3 class="text-dark fw-bold mb-0">Chỉnh sửa thông tin phim</h3>
        </div>

        <form th:action="@{/admin/movies/update}" th:object="${movie}" method="post" novalidate>

          <input type="hidden" th:field="*{id}">

          <div class="row">
            <div class="col-md-7">
              <div class="mb-4">
                <label class="form-label fw-bold">Tên phim</label>
                <input type="text" th:field="*{title}" class="form-control form-control-lg border-primary-subtle" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">Đường dẫn Poster (URL)</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                  <input type="text" id="posterInput" th:field="*{posterUrl}" class="form-control" required oninput="updatePreview()">
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('posterUrl')}" th:errors="*{posterUrl}"></div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">Mô tả nội dung</label>
                <textarea th:field="*{description}" class="form-control" rows="6"></textarea>
              </div>

              <div class="row mb-4">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Thể loại</label>
                  <select th:field="*{genre.id}" class="form-select" required>
                    <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
                  </select>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Độ tuổi</label>
                  <select th:field="*{ageRating}" class="form-select">
                    <option value="P">P - Mọi lứa tuổi</option>
                    <option value="T13">T13 - Trên 13 tuổi</option>
                    <option value="T16">T16 - Trên 16 tuổi</option>
                    <option value="T18">T18 - Trên 18 tuổi</option>
                  </select>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Thời lượng (phút)</label>
                  <input type="number" th:field="*{duration}" class="form-control" required>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Giá vé (VNĐ)</label>
                  <input type="number" th:field="*{price}" class="form-control" required>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Ngay phat hanh</label>
                  <input type="date" th:field="*{releaseDate}" class="form-control" th:min="${today}" required>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Trang thai phim</label>
                  <select th:field="*{status}" class="form-select" required>
                    <option value="COMING_SOON">Sap chieu</option>
                    <option value="SHOWING">Dang chieu</option>
                    <option value="ENDED">Da ket thuc</option>
                  </select>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ageRating')}" th:errors="*{ageRating}"></div>
                </div>
              </div>
            </div>

            <div class="col-md-5">
              <div class="sticky-top">
                <label class="form-label fw-bold d-block text-center mb-3">Xem trước Poster</label>
                <img id="posterPreview" th:src="*{posterUrl}" class="preview-poster mb-3"
                     onerror="this.src='https://via.placeholder.com/300x450?text=Lỗi+Liên+Kết'">
              </div>
            </div>
          </div>

          <div class="mt-4 pt-4 border-top d-flex justify-content-end gap-3">
            <a href="/admin/movies" class="btn btn-light px-5 py-2 fw-bold border text-muted">QUAY LẠI</a>
            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow">
              <i class="bi bi-save me-2"></i> LƯU THAY ĐỔI
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function updatePreview() {
    const input = document.getElementById('posterInput');
    const preview = document.getElementById('posterPreview');
    if(input.value) {
      preview.src = input.value;
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
